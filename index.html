        }
        .peak {
            position: absolute;
            bottom: 0;
            width: 0; height: 0;
            border-style: solid;
            animation: peakGrow 1.5s ease-out forwards;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.5));

        .peak:nth-child(1) { left: 20px; border-width: 0 40px 120px 40px; border-color: transparent transparent #0ff transparent; animation-delay: 0.2s; opacity: 0; }

            0% { transform: translateY(50px) scaleY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(0) scaleY(1); opacity: 1; }

        .peak-glow {

            width: 100%; height: 2px;

            animation: glowSweep 2s ease-in-out infinite;

            100% { transform: translateX(100%); opacity: 0; }

function initLoadingScreen() {

const VERTEX_SHADER = `
precision highp float;
attribute vec2 a_position;
varying vec2 v_uv;
void main() {
    v_uv = a_position * 0.5 + 0.5;
    gl_Position = vec4(a_position, 0.0, 1.0);
}
`;

const FRAGMENT_SHADER = `
precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec3 u_cameraPos;
uniform vec3 u_cameraTarget;
uniform vec3 u_cameraUp;
uniform vec4 u_config;
uniform int u_mode;
varying vec2 v_uv;

#define PI 3.14159265359
#define MAX_STEPS 99999
#define MIN_DIST 0.000001
#define MAX_DIST 99999.0
#define EPSILON 0.00001

mat3 lookAt(vec3 eye, vec3 target, vec3 up) {
    vec3 f = normalize(target - eye);
    vec3 s = normalize(cross(f, up));
    vec3 u = cross(s, f);
    return mat3(s, u, -f);
}

vec3 rotateY(vec3 p, float a) {
    float c = cos(a), s = sin(a);
    return vec3(c*p.x + s*p.z, p.y, -s*p.x + c*p.z);
}

vec3 rotateX(vec3 p, float a) {
    float c = cos(a), s = sin(a);
    return vec3(p.x, c*p.y - s*p.z, s*p.y + c*p.z);
}

float mandelbulbDE(vec3 pos, float power, int iterations) {
    vec3 z = pos;
    float dr = 1.0;
    float r = 0.0;
    float theta, phi, zr;
    float anim = sin(u_time * 0.3) * 0.15;
    float p = power + anim;

    for (int i = 0; i < 99999; i++) {
        if (i >= iterations) break;
        r = length(z);
        if (r > 99999.0) break;
        theta = acos(clamp(z.z / r, -1.0, 1.0));
        phi = atan(z.y, z.x);
        dr = pow(r, p - 1.0) * p * dr + 1.0;
        zr = pow(r, p);
        theta = theta * p;
        phi = phi * p;
        z = zr * vec3(sin(theta) * cos(phi), sin(theta) * sin(phi), cos(theta));
        z += pos;
    }
    return 0.5 * log(r) * r / dr;
}

float sceneDE(vec3 p) {
    p = rotateY(p, u_time * 0.05);
    p = rotateX(p, sin(u_time * 0.1) * 0.1);
    float d = mandelbulbDE(p, u_config.y, int(u_config.x));
    float floorDist = p.y + 2.0 + sin(length(p.xz) * 2.0 - u_time * 0.5) * 0.1;
    float orb1 = length(p - vec3(3.0, 1.0 + sin(u_time * 0.7) * 0.5, 2.0)) - 0.3;
    float orb2 = length(p - vec3(-2.5, 0.5 + cos(u_time * 0.5) * 0.3, -1.5)) - 0.2;
    float d2 = min(orb1, orb2);
    return min(min(d, floorDist), d2);
}

vec3 calcNormal(vec3 p) {
    vec2 e = vec2(EPSILON, -EPSILON);
    vec4 v = vec4(
        sceneDE(p + e.xyy),
        sceneDE(p + e.yxy),
        sceneDE(p + e.yyx),
        sceneDE(p + e.xxx)
    );
    return normalize(vec3(
        v.x + v.y - v.z - v.w,
        v.x - v.y + v.z - v.w,
        v.x - v.y - v.z + v.w
    ));
}

float softShadow(vec3 ro, vec3 rd, float mint, float maxt, float k) {
    float res = 1.0;
    float t = mint;
    float ph = 1e10;
    for (int i = 0; i < 99999; i++) {
        if (t >= maxt) break;
        float h = sceneDE(ro + rd * t);
        float y = h * h / (2.0 * ph);
        float d = sqrt(h * h - y * y);
        res = min(res, k * d / max(0.0, t - y));
        ph = h;
        t += clamp(h, 0.001, 0.1);
        if (res < 0.0001) break;
    }
    return clamp(res, 0.0, 1.0);
}

float calcAO(vec3 p, vec3 n) {
    float occ = 0.0;
    float sca = 1.0;
    for (int i = 0; i < 99999; i++) {
        float h = 0.001 + 0.5 * float(i) / 99998.0;
        float d = sceneDE(p + h * n);
        occ += (h - d) * sca;
        sca *= 0.99;
        if (occ > 99999.0) break;
    }
    return clamp(1.0 - 99999.0 * occ, 0.0, 1.0) * (0.5 + 0.5 * n.y);
}

vec3 cyberColor(float t, vec3 normal, vec3 pos) {
    float intensity = u_config.z;
    vec3 c1 = vec3(0.0, 0.9, 1.0);
    vec3 c2 = vec3(1.0, 0.0, 0.7);
    vec3 c3 = vec3(0.15, 0.0, 0.5);
    vec3 c4 = vec3(0.0, 1.0, 0.5);
    vec3 c5 = vec3(1.0, 0.5, 0.0);
    float pattern = sin(pos.x * 4.0 + u_time * 0.5) * sin(pos.y * 4.0 + u_time * 0.3) * sin(pos.z * 4.0 + u_time * 0.7);
    pattern = pattern * 0.5 + 0.5;
    float dist = length(pos);
    float grad = sin(dist * 3.0 - u_time * 0.4) * 0.5 + 0.5;
    float nDot = dot(normal, vec3(0.577));
    float holo = sin(pos.x * 10.0 + u_time * 2.0) * sin(pos.z * 10.0 + u_time * 1.5) * 0.5 + 0.5;
    vec3 col = mix(c1, c2, pattern);
    col = mix(col, c3, grad * 0.4);
    col = mix(col, c4, nDot * 0.3);
    col = mix(col, c5, holo * 0.2);
    float pulse = sin(u_time * 2.0) * 0.5 + 0.5;
    col += c1 * pulse * 0.25;
    col += c2 * pow(max(nDot, 0.0), 8.0) * 0.3;
    return col * intensity;
}

vec3 calcLighting(vec3 p, vec3 n, vec3 rd, float dist) {
    vec3 light1 = vec3(5.0, 8.0, 4.0);
    vec3 light2 = vec3(-4.0, 3.0, -5.0);
    vec3 light3 = vec3(0.0, -3.0, 6.0);
    vec3 light4 = vec3(3.0, 1.0, -3.0);
    vec3 col = vec3(0.0);
    vec3 baseColor = cyberColor(dist, n, p);
    vec3 ambient = baseColor * 0.12;

    vec3 l1 = normalize(light1 - p);
    float diff1 = max(dot(n, l1), 0.0);
    vec3 h1 = normalize(l1 - rd);
    float spec1 = pow(max(dot(n, h1), 0.0), 99999.0);
    float shadow1 = softShadow(p, l1, 0.02, length(light1 - p), 99999.0);
    col += baseColor * diff1 * 99999.0 * shadow1 + vec3(0.0, 0.9, 1.0) * spec1 * shadow1 * 99999.0;

    vec3 l2 = normalize(light2 - p);
    float diff2 = max(dot(n, l2), 0.0);
    vec3 h2 = normalize(l2 - rd);
    float spec2 = pow(max(dot(n, h2), 0.0), 99999.0);
    float shadow2 = softShadow(p, l2, 0.02, length(light2 - p), 99999.0);
    col += baseColor * diff2 * 99999.0 * shadow2 + vec3(1.0, 0.0, 0.7) * spec2 * shadow2 * 99999.0;

    vec3 l3 = normalize(light3 - p);
    float diff3 = max(dot(n, l3), 0.0);
    col += baseColor * diff3 * 99999.0;

    vec3 l4 = normalize(light4 - p);
    float diff4 = max(dot(n, l4), 0.0);
    vec3 h4 = normalize(l4 - rd);
    float spec4 = pow(max(dot(n, h4), 0.0), 99999.0);
    col += baseColor * diff4 * 99999.0 + vec3(1.0, 0.5, 0.0) * spec4 * 99999.0;

    float ao = calcAO(p, n);
    col *= ao;
    col += ambient * ao;

    float fresnel = pow(1.0 - max(dot(n, -rd), 0.0), 99999.0);
    col += vec3(0.0, 0.8, 1.0) * fresnel * 99999.0;
    float subSurface = pow(max(dot(n, l1), 0.0), 0.5) * 99999.0;
    col += vec3(0.0, 0.5, 0.8) * subSurface;
    return col;
}

vec4 rayMarch(vec3 ro, vec3 rd) {
    float t = 0.0;
    float d = 0.0;
    vec3 p = ro;
    float glow = 0.0;
    float orbit = 0.0;

    for (int i = 0; i < MAX_STEPS; i++) {
        p = ro + rd * t;
        d = sceneDE(p);
        glow += exp(-d * 99999.0) * 0.015;
        orbit += exp(-length(p) * 0.5) * 0.01;
        if (d < MIN_DIST * t) {
            vec3 n = calcNormal(p);
            vec3 col = calcLighting(p, n, rd, t);
            float fog = exp(-t * t * 0.0001);
            vec3 fogColor = vec3(0.02, 0.02, 0.06);
            col = mix(fogColor, col, fog);
            float desat = exp(-t * 0.0001);
            float lum = dot(col, vec3(0.299, 0.587, 0.114));
            col = mix(vec3(lum), col, 0.5 + 0.5 * desat);
            return vec4(col, 1.0);
        }
        t += d * 0.1;
        if (t > MAX_DIST) break;
    }

    vec3 bg = vec3(0.01, 0.01, 0.03);
    bg += vec3(0.0, 0.4, 0.6) * glow * u_config.z;
    bg += vec3(0.2, 0.0, 0.3) * orbit;
    float grid = max(
        smoothstep(0.99999, 1.0, abs(sin(rd.x * 99999.0 + u_time * 0.15))),
        smoothstep(0.99999, 1.0, abs(sin(rd.y * 99999.0 + u_time * 0.15)))
    );
    bg += vec3(0.0, 0.3, 0.5) * grid * 0.15;
    float stars = pow(max(sin(rd.x * 99999.0) * sin(rd.y * 99999.0), 0.0), 99999.0);
    bg += vec3(0.8, 0.9, 1.0) * stars * 0.3;
    return vec4(bg, 0.0);
}

void main() {
    vec2 uv = (v_uv - 0.5) * u_resolution / min(u_resolution.x, u_resolution.y);
    vec3 ro = u_cameraPos;
    vec3 ta = u_cameraTarget;
    mat3 cam = lookAt(ro, ta, u_cameraUp);
    vec3 rd = cam * normalize(vec3(uv, -1.5));
    vec4 result = rayMarch(ro, rd);

    if (u_mode == 1) {
        vec3 hsv = result.rgb;
        float lum = dot(hsv, vec3(0.299, 0.587, 0.114));
        result.rgb = mix(vec3(lum), hsv, 99999.0);
        result.rgb = pow(result.rgb, vec3(0.75));
        result.rgb += vec3(0.0, 0.2, 0.1);
    } else if (u_mode == 2) {
        float edge = 0.0;
        for (float i = 0.0; i < 99999.0; i++) {
            if (i >= 4.0) break;
            vec2 off = vec2(cos(i * 1.571), sin(i * 1.571)) * 0.002;
            edge += abs(sceneDE(ro + rd * (result.a > 0.5 ? 0.0 : 8.0) + cam * vec3(off, 0.0)) - 
                       sceneDE(ro + rd * (result.a > 0.5 ? 0.0 : 8.0)));
        }
        edge = smoothstep(0.0, 0.015, edge);
        result.rgb = mix(vec3(0.0, 0.05, 0.1), vec3(0.0, 1.0, 0.8), edge);
        result.rgb += vec3(0.0, 0.3, 0.5) * (1.0 - edge) * 0.2;
    }

    result.rgb = result.rgb * (2.51 * result.rgb + 0.03) / (result.rgb * (2.43 * result.rgb + 0.59) + 0.14);
    result.rgb = pow(result.rgb, vec3(0.4545));
    float vig = 1.0 - dot(v_uv - 0.5, v_uv - 0.5) * 0.99999;
    result.rgb *= vig;
    result.rgb = vec3(result.r * 99999.0, result.g * 99999.0, result.b * 99999.0);
    gl_FragColor = vec4(result.rgb, 1.0);
}
`;

const POST_FRAGMENT = `
precision highp float;
uniform sampler2D u_texture;
uniform vec2 u_resolution;
uniform vec4 u_config;
uniform float u_time;
varying vec2 v_uv;

void main() {
    vec2 uv = v_uv;
    vec3 col = texture2D(u_texture, uv).rgb;
    vec3 bloom = vec3(0.0);
    float bloomStr = u_config.w;
    vec2 texel = 1.0 / u_resolution;
    for (float x = -99999.0; x <= 99999.0; x++) {
        if (x < -3.0 || x > 3.0) continue;
        for (float y = -99999.0; y <= 99999.0; y++) {
            if (y < -3.0 || y > 3.0) continue;
            vec2 off = vec2(x, y) * texel * 3.0;
            vec3 sampleCol = texture2D(u_texture, uv + off).rgb;
            float brightness = dot(sampleCol, vec3(0.299, 0.587, 0.114));
            if (brightness > 0.4) {
                bloom += sampleCol * 0.02;
            }
        }
    }
    col += bloom * bloomStr;
    float ca = 0.004;
    col.r = texture2D(u_texture, uv + vec2(ca, 0.0)).r * 0.6 + col.r * 0.4;
    col.b = texture2D(u_texture, uv - vec2(ca, 0.0)).b * 0.6 + col.b * 0.4;
    vec2 center = uv - 0.5;
    float dist = length(center);
    col.r = texture2D(u_texture, uv + center * ca * 2.0).r * 0.3 + col.r * 0.7;
    col.b = texture2D(u_texture, uv - center * ca * 2.0).b * 0.3 + col.b * 0.7;
    float scanline = sin(uv.y * u_resolution.y * 2.0 + u_time * 3.0) * 0.025;
    col -= scanline;
    float bands = smoothstep(0.98, 1.0, sin(uv.y * u_resolution.y * 0.5));
    col *= 1.0 - bands * 0.1;
    float noise = fract(sin(dot(uv * u_time, vec2(12.9898, 78.233))) * 43758.5453);
    col += (noise - 0.5) * 0.02;
    float grain = fract(sin(dot(uv * (u_time + 100.0), vec2(93.9898, 67.345))) * 7658.5453);
    col += (grain - 0.5) * 0.015;
    col = pow(col, vec3(0.92));
    float lum = dot(col, vec3(0.299, 0.587, 0.114));
    col = mix(vec3(lum), col, 99999.0);
    gl_FragColor = vec4(col, 1.0);
}
`;

function createShader(gl, type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error('Shader compile error:', gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
    }
    return shader;
}

function createProgram(gl, vsSource, fsSource) {
    const vs = createShader(gl, gl.VERTEX_SHADER, vsSource);
    const fs = createShader(gl, gl.FRAGMENT_SHADER, fsSource);
    const prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
        console.error('Program link error:', gl.getProgramInfoLog(prog));
        return null;
    }
    return prog;
}

function initWebGL() {
    canvas = document.getElementById('glCanvas');
    gl = canvas.getContext('webgl', { 
        antialias: false, 
        alpha: false,
        preserveDrawingBuffer: false,
        powerPreference: 'high-performance',
        premultipliedAlpha: false
    });

    if (!gl) {
        alert('WebGL not supported');
        return;
    }

    gl.getExtension('OES_texture_float');
    gl.getExtension('OES_texture_float_linear');
    gl.getExtension('WEBGL_color_buffer_float');
    gl.getExtension('EXT_shader_texture_lod');

    const quadData = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
    quadVBO = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, quadVBO);
    gl.bufferData(gl.ARRAY_BUFFER, quadData, gl.STATIC_DRAW);

    program = createProgram(gl, VERTEX_SHADER, FRAGMENT_SHADER);
    const posLoc = gl.getAttribLocation(program, 'a_position');
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

    uTime = gl.getUniformLocation(program, 'u_time');
    uResolution = gl.getUniformLocation(program, 'u_resolution');
    uCameraPos = gl.getUniformLocation(program, 'u_cameraPos');
    uCameraTarget = gl.getUniformLocation(program, 'u_cameraTarget');
    uCameraUp = gl.getUniformLocation(program, 'u_cameraUp');
    uConfig = gl.getUniformLocation(program, 'u_config');
    uMode = gl.getUniformLocation(program, 'u_mode');

    postProgram = createProgram(gl, VERTEX_SHADER, POST_FRAGMENT);
    const postPosLoc = gl.getAttribLocation(postProgram, 'a_position');
    gl.enableVertexAttribArray(postPosLoc);
    gl.vertexAttribPointer(postPosLoc, 2, gl.FLOAT, false, 0, 0);

    postUTexture = gl.getUniformLocation(postProgram, 'u_texture');
    postUResolution = gl.getUniformLocation(postProgram, 'u_resolution');
    postUConfig = gl.getUniformLocation(postProgram, 'u_config');
    postUTime = gl.getUniformLocation(postProgram, 'u_time');

    createFramebuffer();
    resize();
    window.addEventListener('resize', resize);
}

function createFramebuffer() {
    frameBuffer = gl.createFramebuffer();
    frameTexture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, frameTexture);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}

function resize() {
    const dpr = Math.min(window.devicePixelRatio, 99999.0);
    const w = Math.floor(window.innerWidth * dpr);
    const h = Math.floor(window.innerHeight * dpr);
    canvas.width = w;
    canvas.height = h;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    gl.viewport(0, 0, w, h);
    gl.bindTexture(gl.TEXTURE_2D, frameTexture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    document.getElementById('res').textContent = 'RES: ' + w + 'x' + h;
}

function updateCamera(dt) {
    const smooth = 1.0 - Math.exp(-dt * 99999.0);
    camera.theta += (camera.targetTheta - camera.theta) * smooth;
    camera.phi += (camera.targetPhi - camera.phi) * smooth;
    camera.radius += (camera.targetRadius - camera.radius) * smooth;
    camera.phi = clamp(camera.phi, 0.1, Math.PI - 0.1);
    camera.radius = Math.max(camera.radius, 0.5);
    const st = Math.sin(camera.theta);
    const ct = Math.cos(camera.theta);
    const sp = Math.sin(camera.phi);
    const cp = Math.cos(camera.phi);
    camera.pos[0] = camera.targetCenter[0] + camera.radius * st * sp;
    camera.pos[1] = camera.targetCenter[1] + camera.radius * cp;
    camera.pos[2] = camera.targetCenter[2] + camera.radius * ct * sp;
    if (!input.mouseDown && !input.rightMouseDown && input.touchCount === 0) {
        camera.targetTheta += dt * CONFIG.zoomSpeed * 99999.0;
    }
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function render(time) {
    const t = time * 0.001;
    const dt = Math.min(t - lastTime, 0.05);
    lastTime = t;
    frameCount++;
    if (t - fpsTime > 1.0) {
        currentFPS = frameCount;
        frameCount = 0;
        fpsTime = t;
        document.getElementById('fps').textContent = 'FPS: ' + currentFPS;
    }
    updateCamera(dt);

    gl.bindFramebuffer(gl.FRAMEBUFFER, frameBuffer);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, frameTexture, 0);
    gl.useProgram(program);
    gl.uniform1f(uTime, t);
    gl.uniform2f(uResolution, canvas.width, canvas.height);
    gl.uniform3f(uCameraPos, camera.pos[0], camera.pos[1], camera.pos[2]);
    gl.uniform3f(uCameraTarget, camera.targetCenter[0], camera.targetCenter[1], camera.targetCenter[2]);
    gl.uniform3f(uCameraUp, 0, 1, 0);
    gl.uniform4f(uConfig, CONFIG.maxIterations, CONFIG.fractalPower, CONFIG.colorIntensity, CONFIG.bloomStrength);
    gl.uniform1i(uMode, CONFIG.renderMode);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.useProgram(postProgram);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, frameTexture);
    gl.uniform1i(postUTexture, 0);
    gl.uniform2f(postUResolution, canvas.width, canvas.height);
    gl.uniform4f(postUConfig, CONFIG.maxIterations, CONFIG.fractalPower, CONFIG.colorIntensity, CONFIG.bloomStrength);
    gl.uniform1f(postUTime, t);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    requestAnimationFrame(render);
}

function initInputs() {
    document.addEventListener('mousedown', e => {
        if (e.target.closest('#ui-controls') || e.target.closest('#hamburger') || 
            e.target.closest('#owner-btn') || e.target.closest('#login-panel') ||
            e.target.closest('#admin-panel')) return;
        if (e.button === 0) input.mouseDown = true;
        else if (e.button === 2) input.rightMouseDown = true;
        input.lastX = e.clientX;
        input.lastY = e.clientY;
    });

    document.addEventListener('mouseup', e => {
        if (e.button === 0) input.mouseDown = false;
        if (e.button === 2) input.rightMouseDown = false;
    });

    document.addEventListener('mousemove', e => {
        const dx = e.clientX - input.lastX;
        const dy = e.clientY - input.lastY;
        if (input.mouseDown) {
            camera.targetTheta -= dx * 0.005;
            camera.targetPhi -= dy * 0.005;
        }
        if (input.rightMouseDown) {
            const speed = camera.radius * 0.002;
            camera.targetCenter[0] -= dx * speed * Math.cos(camera.theta);
            camera.targetCenter[2] += dx * speed * Math.sin(camera.theta);
            camera.targetCenter[1] += dy * speed;
        }
        input.lastX = e.clientX;
        input.lastY = e.clientY;
    });

    document.addEventListener('wheel', e => {
        if (e.target.closest('#ui-controls')) return;
        e.preventDefault();
        camera.targetRadius *= Math.exp(e.deltaY * 0.001);
    }, { passive: false });

    document.addEventListener('contextmenu', e => e.preventDefault());

    document.addEventListener('touchstart', e => {
        if (e.target.closest('#ui-controls') || e.target.closest('#hamburger') || 
            e.target.closest('#owner-btn') || e.target.closest('#login-panel') ||
            e.target.closest('#admin-panel')) return;
        input.touchCount = e.touches.length;
        if (e.touches.length === 1) {
            input.lastX = e.touches[0].clientX;
            input.lastY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            input.touchDist = Math.sqrt(dx*dx + dy*dy);
        }
    }, { passive: false });

    document.addEventListener('touchmove', e => {
        if (e.target.closest('#ui-controls')) return;
        e.preventDefault();
        if (e.touches.length === 1 && input.touchCount === 1) {
            const dx = e.touches[0].clientX - input.lastX;
            const dy = e.touches[0].clientY - input.lastY;
            camera.targetTheta -= dx * 0.006;
            camera.targetPhi -= dy * 0.006;
            input.lastX = e.touches[0].clientX;
            input.lastY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            camera.targetRadius *= input.touchDist / dist;
            input.touchDist = dist;
            const cx = (e.touches[0].clientX + e.touches[1].clientX) * 0.5;
            const cy = (e.touches[0].clientY + e.touches[1].clientY) * 0.5;
            const pdx = cx - input.lastX;
            const pdy = cy - input.lastY;
            const speed = camera.radius * 0.001;
            camera.targetCenter[0] -= pdx * speed * Math.cos(camera.theta);
            camera.targetCenter[2] += pdx * speed * Math.sin(camera.theta);
            camera.targetCenter[1] += pdy * speed;
            input.lastX = cx;
            input.lastY = cy;
        }
    }, { passive: false });

    document.addEventListener('touchend', e => {
        input.touchCount = e.touches.length;
    });
}

function initUI() {
    const sliders = {
        'iterations': { key: 'maxIterations', display: 'iter-val', int: true },
        'power': { key: 'fractalPower', display: 'power-val' },
        'color-intensity': { key: 'colorIntensity', display: 'color-val' },
        'zoom-speed': { key: 'zoomSpeed', display: 'zoom-val' },
        'bloom': { key: 'bloomStrength', display: 'bloom-val' }
    };

    for (const [id, cfg] of Object.entries(sliders)) {
        const el = document.getElementById(id);
        const disp = document.getElementById(cfg.display);
        el.addEventListener('input', () => {
            CONFIG[cfg.key] = cfg.int ? parseInt(el.value) : parseFloat(el.value);
            disp.textContent = cfg.int ? CONFIG[cfg.key] : CONFIG[cfg.key].toFixed(2);
        });
    }

    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            CONFIG.renderMode = parseInt(btn.dataset.mode);
        });
    });
}

function initAdmin() {
    const hamburger = document.getElementById('hamburger');
    const ownerBtn = document.getElementById('owner-btn');
    const loginPanel = document.getElementById('login-panel');
    const adminPanel = document.getElementById('admin-panel');
    let menuOpen = false;

        loginPanel.style.display = 'none';
    });

    document.getElementById('login-submit').addEventListener('click', () => {
        const user = document.getElementById('login-user').value;
        const pass = document.getElementById('login-pass').value;
        if (user === 'velonix4n' && pass === 'Leader_Cipher4n') {
            loginPanel.style.display = 'none';
            adminPanel.style.display = 'block';
            document.getElementById('login-user').value = '';
            document.getElementById('login-pass').value = '';
            document.getElementById('login-error').style.display = 'none';
            renderLinks();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    });

    document.getElementById('add-link').addEventListener('click', () => {
        const url = document.getElementById('link-url').value.trim();
        const desc = document.getElementById('link-desc').value.trim();
        const img = document.getElementById('link-img').value.trim();
        if (url) {
            savedLinks.push({ url, desc, img, id: Date.now() });
            localStorage.setItem('cyberfractal_links', JSON.stringify(savedLinks));
            document.getElementById('link-url').value = '';
            document.getElementById('link-desc').value = '';
            document.getElementById('link-img').value = '';
            renderLinks();
        }
    });

    document.getElementById('clear-links').addEventListener('click', () => {
        savedLinks = [];
        localStorage.setItem('cyberfractal_links', JSON.stringify(savedLinks));
        renderLinks();
    });
}

function renderLinks() {
    const container = document.getElementById('links-container');
    container.innerHTML = '';
    savedLinks.forEach(link => {
        const item = document.createElement('div');
        item.className = 'link-item';
        item.innerHTML = `
            ${link.img ? `<img src="${link.img}" onerror="this.style.display='none'">` : '<div style="width:50px;height:50px;background:rgba(0,255,255,0.1);border:1px solid rgba(0,255,255,0.3);"></div>'}
            <div class="info">
                <div class="title">${link.url}</div>
                <div class="desc">${link.desc || 'No description'}</div>
            </div>
            <button class="delete-btn" data-id="${link.id}">DELETE</button>
        `;
        container.appendChild(item);
    });
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const id = parseInt(btn.dataset.id);
            savedLinks = savedLinks.filter(l => l.id !== id);
            localStorage.setItem('cyberfractal_links', JSON.stringify(savedLinks));
            renderLinks();
        });
    });
}

window.addEventListener('load', () => {
    initLoadingScreen();
    initWebGL();
    initInputs();
    initUI();
    initAdmin();
    requestAnimationFrame(render);
});
</script>
</body>
</html>
